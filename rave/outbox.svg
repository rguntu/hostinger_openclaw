<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Business Service -->
  <rect x="50" y="100" width="120" height="60" rx="5" fill="#f0f0f0" stroke="#333" />
  <text x="110" y="135" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Business Service</text>

  <!-- Database -->
  <rect x="250" y="80" width="160" height="100" rx="5" fill="#e1f5fe" stroke="#0277bd" />
  <text x="330" y="100" font-family="Arial" font-size="12" text-anchor="middle" fill="#0277bd" font-weight="bold">Database</text>
  <rect x="260" y="110" width="140" height="25" fill="#fff" stroke="#0277bd" />
  <text x="330" y="127" font-family="Arial" font-size="10" text-anchor="middle">Users Table</text>
  <rect x="260" y="140" width="140" height="25" fill="#fff" stroke="#0277bd" />
  <text x="330" y="157" font-family="Arial" font-size="10" text-anchor="middle">Outbox Table</text>

  <!-- Message Relayer -->
  <rect x="500" y="100" width="80" height="60" rx="5" fill="#fff3e0" stroke="#ef6c00" />
  <text x="540" y="135" font-family="Arial" font-size="12" text-anchor="middle" fill="#ef6c00">CDC Relayer</text>

  <!-- Arrows -->
  <line x1="170" y1="130" x2="245" y2="130" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="410" y1="130" x2="495" y2="130" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
</svg>